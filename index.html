<!doctype html>
<html>
  <head>
    <title>Kaju is noting!</title>
    <link rel="icon" href="logo.png" type="image/x-icon" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="toolbar">
      <button data-tool="select" title="View Mode">V</button>
      <button data-tool="rect" title="Rectangle">☐</button>
      <button data-tool="text" title="Text">T</button>
      <button data-tool="sketch" title="Sketch">✏️</button>
      <button data-tool="eraser" title="Eraser">🧽</button>
      <button data-action="load" title="Load">🔽</button>
      <button data-action="save" title="Save">💾</button>
      <button data-action="export" title="Export PNG">⏫</button>
      <button data-action="undo" title="Undo">↶</button>
      <button data-action="redo" title="Redo">↷</button>
    </div>
    <input type="file" id="fileInput" accept=".kj" hidden />
    <canvas id="canvas"></canvas>
    <textarea id="textEditor"></textarea>
    <script src="app.js"></script>
  </body>
</html>
