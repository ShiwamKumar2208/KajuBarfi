<!doctype html>
<html>
  <head>
    <title>Kaju is noting!</title>
    <link rel="icon" href="logo.png" type="image/x-icon" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="toolbar">
      <button data-tool="select" ttip="View Mode">V</button>
      <button data-tool="rect" ttip="Rectangle">☐</button>
      <button data-tool="text" ttip="Text">T</button>
      <button data-tool="sketch" ttip="Sketch">✏️</button>
      <button data-tool="eraser" ttip="Eraser">🧽</button>
      <button id="themeToggle" ttip="Toggle Theme">🌙</button>
      <button id="gridToggle" ttip="Toggle Grid Style">🔶</button>
      <button data-action="image-url" ttip="Add Image URL">🖼️</button>
      <button data-action="load" ttip="Load">🔽</button>
      <button data-action="save" ttip="Save">💾</button>
      <button data-action="export" ttip="Export PNG">⏫</button>
      <button data-action="undo" ttip="Undo">↶</button>
      <button data-action="redo" ttip="Redo">↷</button>
    </div>
    <input type="file" id="fileInput" accept=".kj" hidden />
    <canvas id="canvas" tabindex="0"></canvas>
    <textarea id="textEditor"></textarea>
    <script type="module" src="app.js"></script>
  </body>
</html>
